<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    #season-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.22;
      transition: opacity 1s ease;
    }

    header {
      background: #2b6cb0;
      color: white;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .container {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* 요약 카드 */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      text-align: center;
    }

    .card .label {
      font-size: .8rem;
      color: #718096;
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .card .amount {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .card.income  .amount { color: #38a169; }
    .card.expense .amount { color: #e53e3e; }
    .card.balance .amount { color: #2b6cb0; }

    /* 입력 폼 */
    .form-box {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 1.5rem;
    }

    .form-box h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #4a5568;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: .75rem;
      align-items: end;
    }

    .form-group { display: flex; flex-direction: column; gap: .3rem; }

    label { font-size: .8rem; color: #718096; }

    input, select {
      padding: .55rem .75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, select:focus { border-color: #63b3ed; }

    button.add-btn {
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 8px;
      padding: .6rem 1.2rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }

    button.add-btn:hover { background: #2c5282; }

    /* 필터 */
    .filter-bar {
      display: flex;
      gap: .75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar select, .filter-bar input[type="month"] {
      padding: .45rem .75rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: .85rem;
      background: white;
    }

    .filter-bar label { font-size: .85rem; color: #4a5568; }

    /* 거래 목록 */
    .list-box {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      overflow: hidden;
    }

    .list-box h2 {
      font-size: 1rem;
      font-weight: 600;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #edf2f7;
      color: #4a5568;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f7fafc;
      padding: .7rem 1rem;
      text-align: left;
      font-size: .78rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    tbody tr { border-top: 1px solid #edf2f7; transition: background .15s; }
    tbody tr:hover { background: #f7fafc; }

    td {
      padding: .75rem 1rem;
      font-size: .9rem;
    }

    td.income  { color: #38a169; font-weight: 600; }
    td.expense { color: #e53e3e; font-weight: 600; }

    .badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
    }

    .badge-income  { background: #c6f6d5; color: #276749; }
    .badge-expense { background: #fed7d7; color: #9b2c2c; }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      transition: color .2s;
    }

    .del-btn:hover { color: #e53e3e; }

    td.desc-cell {
      cursor: text;
      position: relative;
    }

    td.desc-cell:hover .desc-text { text-decoration: underline dotted #a0aec0; }

    td.desc-cell input.desc-input {
      width: 100%;
      padding: .25rem .4rem;
      border: 1.5px solid #63b3ed;
      border-radius: 6px;
      font-size: .9rem;
      outline: none;
      background: #ebf8ff;
    }

    .empty { text-align: center; padding: 2rem; color: #a0aec0; font-size: .9rem; }

    /* 그래프 */
    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .chart-box {
      background: white;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .chart-box h2 {
      font-size: .9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: .8rem;
      text-align: center;
    }

    .chart-wrap {
      position: relative;
      height: 210px;
    }

    .chart-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 210px;
      color: #a0aec0;
      font-size: .85rem;
    }

    /* 테이블 가로 스크롤 */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ── 태블릿 (≤ 768px) ── */
    @media (max-width: 768px) {
      .container { margin: 1rem auto; }
      .form-row {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .add-btn-wrap { grid-column: 1 / -1; }
      .add-btn-wrap button { width: 100%; }
    }

    /* ── 모바일 (≤ 480px) ── */
    @media (max-width: 480px) {
      header { font-size: 1.1rem; padding: .75rem 1rem; }
      .container { margin: .75rem auto; padding: 0 .75rem; }

      /* 요약 카드 */
      .summary { gap: .5rem; margin-bottom: 1rem; }
      .card { padding: .75rem .5rem; }
      .card .label { font-size: .65rem; }
      .card .amount { font-size: 1rem; }

      /* 그래프 */
      .charts { grid-template-columns: 1fr; margin-bottom: 1rem; }
      .chart-wrap, .chart-empty { height: 170px; }

      /* 입력 폼 */
      .form-box { padding: 1rem; margin-bottom: 1rem; }
      .form-row { grid-template-columns: 1fr 1fr; }
      /* 내용·금액 한 줄씩 */
      .form-row .form-group:nth-child(4),
      .form-row .form-group:nth-child(5) { grid-column: span 2; }
      .add-btn-wrap { grid-column: 1 / -1; }
      .add-btn-wrap button { width: 100%; }

      /* 필터 */
      .filter-bar { gap: .4rem; }
      .filter-bar label { font-size: .8rem; }

      /* 테이블 */
      table { font-size: .78rem; min-width: 460px; }
      thead th, td { padding: .5rem .6rem; }
    }
  </style>
</head>
<body>

<div id="season-bg"></div>

<header>💰 가계부</header>

<div class="container">

  <!-- 요약 -->
  <div class="summary">
    <div class="card income">
      <div class="label">총 수입</div>
      <div class="amount" id="totalIncome">₩0</div>
    </div>
    <div class="card expense">
      <div class="label">총 지출</div>
      <div class="amount" id="totalExpense">₩0</div>
    </div>
    <div class="card balance">
      <div class="label">잔액</div>
      <div class="amount" id="totalBalance">₩0</div>
    </div>
  </div>

  <!-- 그래프 -->
  <div class="charts">
    <div class="chart-box">
      <h2>📊 카테고리별 지출</h2>
      <div id="catChartWrap" class="chart-wrap"><canvas id="catChart"></canvas></div>
    </div>
    <div class="chart-box">
      <h2>📈 월별 수입 · 지출</h2>
      <div id="monthChartWrap" class="chart-wrap"><canvas id="monthChart"></canvas></div>
    </div>
  </div>

  <!-- 입력 폼 -->
  <div class="form-box">
    <h2>거래 추가</h2>
    <div class="form-row">
      <div class="form-group">
        <label for="txDate">날짜</label>
        <input type="date" id="txDate" />
      </div>
      <div class="form-group">
        <label for="txType">구분</label>
        <select id="txType">
          <option value="income">수입</option>
          <option value="expense">지출</option>
        </select>
      </div>
      <div class="form-group">
        <label for="txCategory">카테고리</label>
        <select id="txCategory"></select>
      </div>
      <div class="form-group">
        <label for="txDesc">내용</label>
        <input type="text" id="txDesc" placeholder="예) 점심식사" maxlength="40" />
      </div>
      <div class="form-group">
        <label for="txAmount">금액 (원)</label>
        <input type="number" id="txAmount" placeholder="0" min="0" />
      </div>
      <div class="add-btn-wrap" style="display:flex;align-items:flex-end;">
        <button class="add-btn" onclick="addTransaction()">+ 추가</button>
      </div>
    </div>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <label>월 선택:
      <input type="month" id="filterMonth" onchange="render()" />
    </label>
    <label>구분:
      <select id="filterType" onchange="render()">
        <option value="all">전체</option>
        <option value="income">수입</option>
        <option value="expense">지출</option>
      </select>
    </label>
    <label>카테고리:
      <select id="filterCategory" onchange="render()">
        <option value="all">전체</option>
      </select>
    </label>
  </div>

  <!-- 목록 -->
  <div class="list-box">
    <h2>거래 내역</h2>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th>구분</th>
          <th>카테고리</th>
          <th>내용</th>
          <th style="text-align:right">금액</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="txList"></tbody>
    </table>
    </div>
    <div class="empty" id="emptyMsg" style="display:none">거래 내역이 없습니다.</div>
  </div>

</div>

<script>
  const CATEGORIES = {
    income:  ['급여', '용돈', '부업', '이자/배당', '기타수입'],
    expense: ['식비', '교통', '주거', '의류', '의료', '교육', '문화/여가', '통신', '저축', '기타지출'],
  };

  const sb = supabase.createClient(
    'https://noxpdlyutbzraafrugzd.supabase.co',
    'sb_publishable_ZCfnxWAFtCEiQkArcm6ezA__JDR7UEV'
  );

  let transactions = [];

  // 오늘 날짜 기본값
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('txDate').value = today;

  // 월 필터 기본값
  const thisMonth = today.slice(0, 7);
  document.getElementById('filterMonth').value = thisMonth;

  function updateCategorySelect(typeSelectId, catSelectId) {
    const type = document.getElementById(typeSelectId).value;
    const sel  = document.getElementById(catSelectId);
    sel.innerHTML = CATEGORIES[type].map(c => `<option>${c}</option>`).join('');
  }

  document.getElementById('txType').addEventListener('change', () => {
    updateCategorySelect('txType', 'txCategory');
  });

  updateCategorySelect('txType', 'txCategory');

  function fmt(n) {
    return '₩' + n.toLocaleString('ko-KR');
  }

  const EMOJI_MAP = [
    // 식음료
    { keys: ['커피','카페','아메리카노','라떼'],          emoji: '☕' },
    { keys: ['치킨','닭'],                               emoji: '🍗' },
    { keys: ['피자'],                                    emoji: '🍕' },
    { keys: ['라면','국수','우동','파스타'],              emoji: '🍜' },
    { keys: ['초밥','스시','회'],                        emoji: '🍣' },
    { keys: ['버거','햄버거'],                           emoji: '🍔' },
    { keys: ['삼겹살','고기','구이','갈비','삼계탕'],    emoji: '🥩' },
    { keys: ['빵','케이크','베이커리','카스텔라'],       emoji: '🍰' },
    { keys: ['편의점','cu','gs25','세븐'],               emoji: '🏪' },
    { keys: ['마트','장보기','쇼핑몰','이마트','홈플'], emoji: '🛒' },
    { keys: ['배달','배민','쿠팡이츠','요기요'],         emoji: '🛵' },
    { keys: ['점심','저녁','아침','식사','밥','외식'],   emoji: '🍱' },
    { keys: ['술','맥주','소주','막걸리','와인'],        emoji: '🍺' },
    // 교통
    { keys: ['버스'],                                    emoji: '🚌' },
    { keys: ['지하철','전철','메트로'],                  emoji: '🚇' },
    { keys: ['택시','카카오택시'],                       emoji: '🚕' },
    { keys: ['기름','주유','휘발유','경유'],             emoji: '⛽' },
    { keys: ['주차'],                                    emoji: '🅿️' },
    { keys: ['ktx','기차','철도','고속'],               emoji: '🚆' },
    { keys: ['비행기','항공','공항'],                    emoji: '✈️' },
    { keys: ['자전거','킥보드'],                         emoji: '🚲' },
    // 주거/공과금
    { keys: ['월세','전세','임대','집세'],               emoji: '🏠' },
    { keys: ['관리비'],                                  emoji: '🏢' },
    { keys: ['전기','전력'],                             emoji: '💡' },
    { keys: ['가스'],                                    emoji: '🔥' },
    { keys: ['수도'],                                    emoji: '💧' },
    { keys: ['인터넷','와이파이'],                       emoji: '📡' },
    // 의류/쇼핑
    { keys: ['옷','의류','셔츠','바지','원피스','자켓'], emoji: '👕' },
    { keys: ['신발','운동화','구두'],                    emoji: '👟' },
    { keys: ['가방'],                                    emoji: '👜' },
    // 의료
    { keys: ['병원','의원','클리닉'],                    emoji: '🏥' },
    { keys: ['약','약국','처방'],                        emoji: '💊' },
    { keys: ['치과'],                                    emoji: '🦷' },
    // 교육
    { keys: ['학원','과외','수업'],                      emoji: '📚' },
    { keys: ['책','교재','도서'],                        emoji: '📖' },
    { keys: ['강의','강좌','수강'],                      emoji: '🎓' },
    // 문화/여가
    { keys: ['영화','극장','시네마'],                    emoji: '🎬' },
    { keys: ['게임'],                                    emoji: '🎮' },
    { keys: ['콘서트','공연','뮤지컬'],                  emoji: '🎵' },
    { keys: ['여행','호텔','숙박','펜션'],               emoji: '🏕️' },
    { keys: ['헬스','운동','피트니스','수영'],           emoji: '💪' },
    { keys: ['독서'],                                    emoji: '📖' },
    // 통신
    { keys: ['핸드폰','휴대폰','통신','통화','요금'],   emoji: '📱' },
    // 미용
    { keys: ['미용','헤어','이발','네일','피부'],        emoji: '💇' },
    // 저축/금융
    { keys: ['저축','적금','예금'],                      emoji: '🏦' },
    { keys: ['보험'],                                    emoji: '🛡️' },
    { keys: ['카드','카드값'],                           emoji: '💳' },
    // 수입
    { keys: ['급여','월급','연봉','상여','보너스'],      emoji: '💰' },
    { keys: ['용돈'],                                    emoji: '💵' },
    { keys: ['이자','배당'],                             emoji: '📈' },
    { keys: ['부업','알바','프리랜서'],                  emoji: '💼' },
    // 기타
    { keys: ['선물'],                                    emoji: '🎁' },
    { keys: ['반려','강아지','고양이','펫'],             emoji: '🐾' },
    { keys: ['꽃'],                                      emoji: '💐' },
  ];

  const CATEGORY_EMOJI = {
    '급여': '💰', '용돈': '💵', '부업': '💼', '이자/배당': '📈', '기타수입': '✨',
    '식비': '🍱', '교통': '🚌', '주거': '🏠', '의류': '👕', '의료': '🏥',
    '교육': '📚', '문화/여가': '🎬', '통신': '📱', '저축': '🏦', '기타지출': '📝',
  };

  function getEmoji(desc, category) {
    const lower = desc.toLowerCase();
    for (const { keys, emoji } of EMOJI_MAP) {
      if (keys.some(k => lower.includes(k.toLowerCase()))) return emoji;
    }
    return CATEGORY_EMOJI[category] || '📌';
  }

  async function addTransaction() {
    const date     = document.getElementById('txDate').value;
    const type     = document.getElementById('txType').value;
    const category = document.getElementById('txCategory').value;
    const desc     = document.getElementById('txDesc').value.trim();
    const amount   = parseInt(document.getElementById('txAmount').value, 10);

    if (!date)        { alert('날짜를 선택해주세요.'); return; }
    if (!desc)        { alert('내용을 입력해주세요.'); return; }
    if (!amount || amount <= 0) { alert('올바른 금액을 입력해주세요.'); return; }

    const { data, error } = await sb
      .from('transactions')
      .insert({ date, type, category, description: desc, amount })
      .select()
      .single();
    if (error) { alert('저장 오류: ' + error.message); return; }
    transactions.push({ id: data.id, date: data.date, type: data.type, category: data.category, desc: data.description, amount: data.amount });
    document.getElementById('txDesc').value   = '';
    document.getElementById('txAmount').value = '';
    render();
  }

  async function deleteTransaction(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    const { error } = await sb.from('transactions').delete().eq('id', id);
    if (error) { alert('삭제 오류: ' + error.message); return; }
    transactions = transactions.filter(t => t.id !== id);
    render();
  }

  function startEditDesc(id, td) {
    const tx = transactions.find(t => t.id === id);
    if (!tx) return;
    td.innerHTML = `<input class="desc-input" value="${tx.desc.replace(/"/g, '&quot;')}" maxlength="40" />`;
    const input = td.querySelector('input');
    input.focus();
    input.select();
    const commit = async () => {
      const val = input.value.trim();
      if (val && val !== tx.desc) {
        const { error } = await sb.from('transactions').update({ description: val }).eq('id', tx.id);
        if (!error) tx.desc = val;
      }
      render();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { render(); }
    });
  }

  let catChartInst = null, monthChartInst = null;

  const CAT_COLORS = [
    '#4299e1','#48bb78','#ed8936','#e53e3e','#9f7aea',
    '#38b2ac','#f6ad55','#fc8181','#68d391','#76e4f7',
  ];

  function renderCharts(month) {
    renderCatChart(month);
    renderMonthChart(month);
  }

  function renderCatChart(month) {
    const wrap = document.getElementById('catChartWrap');
    const expenses = transactions
      .filter(t => t.type === 'expense' && (!month || t.date.startsWith(month)));

    if (!expenses.length) {
      if (catChartInst) { catChartInst.destroy(); catChartInst = null; }
      wrap.innerHTML = '<div class="chart-empty">지출 데이터가 없습니다</div>';
      return;
    }

    if (!wrap.querySelector('canvas')) {
      wrap.innerHTML = '<canvas id="catChart"></canvas>';
    }

    const grouped = {};
    expenses.forEach(t => { grouped[t.category] = (grouped[t.category] || 0) + t.amount; });
    const labels = Object.keys(grouped);
    const data   = labels.map(k => grouped[k]);

    if (catChartInst) catChartInst.destroy();
    catChartInst = new Chart(document.getElementById('catChart'), {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data, backgroundColor: CAT_COLORS, borderWidth: 2, borderColor: '#fff' }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)} (${Math.round(ctx.parsed / data.reduce((a,b)=>a+b,0) * 100)}%)`,
            },
          },
        },
      },
    });
  }

  function renderMonthChart(currentMonth) {
    const wrap = document.getElementById('monthChartWrap');

    // 최근 6개월 레이블 생성
    const base = currentMonth
      ? new Date(currentMonth + '-01')
      : new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(base.getFullYear(), base.getMonth() - i, 1);
      months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }

    const incomes  = months.map(m => transactions.filter(t => t.type==='income'  && t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
    const expenses = months.map(m => transactions.filter(t => t.type==='expense' && t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));

    if (incomes.every(v=>v===0) && expenses.every(v=>v===0)) {
      if (monthChartInst) { monthChartInst.destroy(); monthChartInst = null; }
      wrap.innerHTML = '<div class="chart-empty">데이터가 없습니다</div>';
      return;
    }

    if (!wrap.querySelector('canvas')) {
      wrap.innerHTML = '<canvas id="monthChart"></canvas>';
    }

    const labels = months.map(m => m.slice(5) + '월');

    if (monthChartInst) monthChartInst.destroy();
    monthChartInst = new Chart(document.getElementById('monthChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: '수입', data: incomes,  backgroundColor: 'rgba(72,187,120,.75)', borderRadius: 4 },
          { label: '지출', data: expenses, backgroundColor: 'rgba(229,62,62,.65)',  borderRadius: 4 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { labels: { font: { size: 11 }, boxWidth: 12 } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}` } },
        },
        scales: {
          y: { ticks: { callback: v => '₩' + (v >= 1000000 ? (v/1000000).toFixed(1)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v), font: { size: 10 } }, grid: { color: '#edf2f7' } },
          x: { ticks: { font: { size: 11 } }, grid: { display: false } },
        },
      },
    });
  }

  function render() {
    const month    = document.getElementById('filterMonth').value;
    const typeF    = document.getElementById('filterType').value;
    const catF     = document.getElementById('filterCategory').value;

    // 필터 카테고리 옵션 동적 업데이트
    const allCats = [...new Set(transactions.map(t => t.category))].sort();
    const catSel  = document.getElementById('filterCategory');
    const prevCat = catSel.value;
    catSel.innerHTML = '<option value="all">전체</option>' +
      allCats.map(c => `<option ${c === prevCat ? 'selected' : ''}>${c}</option>`).join('');

    let filtered = transactions
      .filter(t => !month || t.date.startsWith(month))
      .filter(t => typeF === 'all' || t.type === typeF)
      .filter(t => catF  === 'all' || t.category === catF)
      .sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);

    // 요약 (필터 전체 기간 기준)
    const monthTx = transactions.filter(t => !month || t.date.startsWith(month));
    const income  = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    document.getElementById('totalIncome').textContent  = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    const bal = income - expense;
    const balEl = document.getElementById('totalBalance');
    balEl.textContent = fmt(Math.abs(bal));
    balEl.style.color = bal < 0 ? '#e53e3e' : '#2b6cb0';

    renderCharts(month);

    const tbody = document.getElementById('txList');
    if (filtered.length === 0) {
      tbody.innerHTML = '';
      document.getElementById('emptyMsg').style.display = 'block';
      return;
    }
    document.getElementById('emptyMsg').style.display = 'none';

    tbody.innerHTML = filtered.map(t => `
      <tr>
        <td>${t.date}</td>
        <td><span class="badge ${t.type === 'income' ? 'badge-income' : 'badge-expense'}">${t.type === 'income' ? '수입' : '지출'}</span></td>
        <td>${t.category}</td>
        <td class="desc-cell" onclick="startEditDesc(${t.id}, this)" title="클릭하여 수정"><span class="desc-text">${getEmoji(t.desc, t.category)} ${t.desc}</span></td>
        <td class="${t.type}" style="text-align:right">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</td>
        <td><button class="del-btn" onclick="deleteTransaction(${t.id})" title="삭제">✕</button></td>
      </tr>
    `).join('');
  }

  async function loadTransactions() {
    const { data, error } = await sb.from('transactions').select('*');
    if (error) { console.error('로딩 오류:', error); return; }
    transactions = data.map(d => ({ id: d.id, date: d.date, type: d.type, category: d.category, desc: d.description, amount: d.amount }));
    render();
  }

  loadTransactions();

  // 계절별 배경 이미지
  (function setSeasonBg() {
    const month = new Date().getMonth() + 1;
    const seasons = {
      spring: { months: [3,4,5],  query: 'spring,cherry-blossom,flowers' },
      summer: { months: [6,7,8],  query: 'summer,beach,blue-sky,ocean'   },
      autumn: { months: [9,10,11], query: 'autumn,fall-leaves,maple'      },
      winter: { months: [12,1,2], query: 'winter,snow,snowfall'           },
    };
    const season = Object.values(seasons).find(s => s.months.includes(month));
    const url = `https://source.unsplash.com/featured/1920x1080/?${season.query}`;
    const bg = document.getElementById('season-bg');
    const img = new Image();
    img.onload = () => { bg.style.backgroundImage = `url('${url}')`; };
    img.src = url;
  })();
</script>
</body>
</html>
